server:
  port: 8080

spring:
  application:
    name: clean-revenue
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:clean_revenue;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    schema: classpath:schema.sql
    initialization-mode: always
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
    type-handlers-package: com.carbonacct.common.converter
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  type-handlers:
    - com.carbonacct.common.converter.YearMonthTypeHandler
